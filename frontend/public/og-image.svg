<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a" />
      <stop offset="100%" style="stop-color:#1e293b" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa" />
      <stop offset="100%" style="stop-color:#a78bfa" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="1000" cy="100" r="300" fill="#3b82f6" opacity="0.05" />
  <circle cx="200" cy="500" r="200" fill="#a78bfa" opacity="0.05" />

  <!-- Code icon -->
  <rect x="80" y="80" width="80" height="80" rx="16" fill="#3b82f6" opacity="0.8"/>
  <text x="120" y="138" font-family="monospace" font-size="40" fill="white" text-anchor="middle">&lt;/&gt;</text>

  <!-- Main heading -->
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">Hi, I'm</text>
  <text x="80" y="390" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="url(#text-grad)">Your Name</text>

  <!-- Subtitle -->
  <text x="80" y="460" font-family="Arial, sans-serif" font-size="36" fill="#94a3b8">Full Stack MERN Developer</text>

  <!-- Tags -->
  <rect x="80" y="510" width="130" height="44" rx="22" fill="#3b82f6" opacity="0.2"/>
  <text x="145" y="538" font-family="Arial, sans-serif" font-size="20" fill="#60a5fa" text-anchor="middle">React</text>

  <rect x="225" y="510" width="150" height="44" rx="22" fill="#3b82f6" opacity="0.2"/>
  <text x="300" y="538" font-family="Arial, sans-serif" font-size="20" fill="#60a5fa" text-anchor="middle">Node.js</text>

  <rect x="390" y="510" width="170" height="44" rx="22" fill="#3b82f6" opacity="0.2"/>
  <text x="475" y="538" font-family="Arial, sans-serif" font-size="20" fill="#60a5fa" text-anchor="middle">MongoDB</text>

  <!-- URL -->
  <text x="1120" y="590" font-family="monospace" font-size="22" fill="#475569" text-anchor="end">yourportfolio.com</text>
</svg>